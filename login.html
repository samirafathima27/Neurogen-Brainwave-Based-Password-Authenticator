<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NeuroGen AI Authentication</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #020617, #000);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Glass Card */
.container {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 25px;
    width: 380px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,255,255,0.2);
}

h1 {
    color: cyan;
    margin-bottom: 10px;
}

/* Input */
input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    margin-top: 10px;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(90deg, cyan, #22d3ee);
    font-weight: bold;
    cursor: pointer;
}

/* Brainwave bars */
.wave {
    display: flex;
    justify-content: center;
    gap: 5px;
    margin: 20px 0;
}

.bar {
    width: 5px;
    height: 20px;
    background: cyan;
    animation: wave 1s infinite;
}

.bar:nth-child(2){animation-delay:0.2s;}
.bar:nth-child(3){animation-delay:0.4s;}
.bar:nth-child(4){animation-delay:0.6s;}
.bar:nth-child(5){animation-delay:0.8s;}

@keyframes wave {
    0% {height:20px;}
    50% {height:60px;}
    100% {height:20px;}
}

#status {
    margin-top: 15px;
}

#confidence {
    margin-top: 10px;
    font-size: 14px;
    color: #22d3ee;
}
</style>
</head>

<body>

<div class="container">
    <h1>🧠 NeuroGen AI</h1>

    <input type="text" placeholder="Enter Username">

    <div class="wave" id="wave" style="display:none;">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>

    <button onclick="startAuth()">Start Authentication</button>

    <p id="status"></p>
    <p id="confidence"></p>
</div>

<script>
// Voice
function speak(text) {
    const speech = new SpeechSynthesisUtterance(text);
    speech.rate = 0.85;
    speech.pitch = 0.9;
    window.speechSynthesis.speak(speech);
}

function startAuth() {
    const status = document.getElementById("status");
    const wave = document.getElementById("wave");
    const confidence = document.getElementById("confidence");

    window.speechSynthesis.cancel();
    wave.style.display = "flex";

    status.innerText = "🔌 Connecting to device...";
    speak("Connecting to brainwave device");

    setTimeout(() => {
        status.innerText = "🧠 Capturing brain signals...";
        speak("Capturing brain signals");

        setTimeout(() => {
            status.innerText = "📊 Processing neural patterns...";
            speak("Processing neural patterns");

            setTimeout(() => {
                status.innerText = "🔐 Authenticating...";
                speak("Authenticating user");

                setTimeout(() => {

                    let success = Math.random() < 0.6;
                    let score = Math.floor(Math.random() * 20) + 75; // 75–95%

                    confidence.innerText = "Confidence Score: " + score + "%";

                    if (success) {
                        status.innerHTML = "✅ <b>Access Granted</b>";
                        speak("Authentication successful");

                        setTimeout(() => {
                            window.location.href = "dashboard.html";
                        }, 3000);

                    } else {
                        status.innerHTML = "❌ <b>Access Denied</b>";
                        speak("Authentication failed");
                    }

                }, 3000);

            }, 3000);

        }, 3000);

    }, 2000);
}
</script>

</body>
</html>
